<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PassExamAI – Exam Revision Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080B12;
  --bg-surf:#0F1420;
  --bg-card:#161D2E;
  --bg-raise:#1C2438;
  --border:rgba(255,255,255,0.07);
  --border-md:rgba(255,255,255,0.12);
  --border-act:rgba(255,255,255,0.2);
  --primary:#4F7EF5;
  --primary-dim:rgba(79,126,245,0.12);
  --primary-mid:rgba(79,126,245,0.25);
  --accent:#F5A623;
  --accent-dim:rgba(245,166,35,0.12);
  --success:#22C55E;
  --success-dim:rgba(34,197,94,0.1);
  --danger:#EF4444;
  --danger-dim:rgba(239,68,68,0.1);
  --warn:#F59E0B;
  --txt:#EDF0FF;
  --txt-muted:#8A93B0;
  --txt-sub:#4F5875;
  --radius:10px;
  --radius-lg:16px;
  --radius-xl:24px;
  --sidebar-w:240px;
  --header-h:64px;
  --font-display:'Crimson Pro',Georgia,serif;
  --font-body:'DM Sans',-apple-system,sans-serif;
  --font-mono:'DM Mono',monospace;
}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
#root{display:flex;min-height:100vh}
::selection{background:var(--primary-mid);color:var(--txt)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-md);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--border-act)}

/* Utility */
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.fade-up{animation:fadeUp .4s ease both}
.fade-in{animation:fadeIn .3s ease both}

/* Layout */
.app-shell{display:flex;width:100%;min-height:100vh}
.sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--bg-surf);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:100;transition:transform .3s ease}
.sidebar-logo{padding:20px 20px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.logo-icon{width:32px;height:32px;background:var(--primary);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.logo-text{font-family:var(--font-display);font-size:18px;font-weight:700;color:var(--txt);letter-spacing:-.3px}
.sidebar-nav{flex:1;padding:12px 10px;overflow-y:auto}
.nav-section-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--txt-sub);padding:8px 10px 4px;margin-top:8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--radius);cursor:pointer;color:var(--txt-muted);font-size:14px;font-weight:500;transition:all .15s;position:relative;text-decoration:none;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--bg-card);color:var(--txt)}
.nav-item.active{background:var(--primary-dim);color:var(--primary)}
.nav-item .nav-icon{width:18px;height:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-badge{margin-left:auto;font-size:11px;background:var(--primary-dim);color:var(--primary);padding:2px 7px;border-radius:99px;font-weight:600}
.sidebar-footer{padding:12px 10px;border-top:1px solid var(--border)}
.sidebar-user{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius);cursor:pointer}
.user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-name{font-size:13px;font-weight:600;color:var(--txt);line-height:1.2}
.user-role{font-size:11px;color:var(--txt-muted);line-height:1.2}

/* Main area */
.main-content{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh;transition:margin .3s ease}
.top-bar{height:var(--header-h);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:16px;background:var(--bg);position:sticky;top:0;z-index:50}
.top-bar-title{font-family:var(--font-display);font-size:22px;font-weight:600;color:var(--txt);flex:1}
.top-bar-actions{display:flex;align-items:center;gap:10px}
.page{flex:1;padding:28px;overflow-x:hidden}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:8px;padding:9px 18px;border-radius:var(--radius);font-family:var(--font-body);font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;border:none;text-decoration:none;white-space:nowrap}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0)}
.btn-outline{background:transparent;color:var(--txt-muted);border:1px solid var(--border-md)}
.btn-outline:hover{border-color:var(--border-act);color:var(--txt);background:var(--bg-card)}
.btn-ghost{background:transparent;color:var(--txt-muted);border:none}
.btn-ghost:hover{color:var(--txt);background:var(--bg-card)}
.btn-danger{background:var(--danger-dim);color:var(--danger);border:1px solid rgba(239,68,68,0.2)}
.btn-danger:hover{background:rgba(239,68,68,0.2)}
.btn-success{background:var(--success-dim);color:var(--success);border:1px solid rgba(34,197,94,0.2)}
.btn-lg{padding:12px 24px;font-size:15px}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-icon{width:36px;height:36px;padding:0;justify-content:center;border-radius:var(--radius)}
.btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}

/* Cards */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px}
.card-hover{transition:border-color .2s,transform .2s;cursor:pointer}
.card-hover:hover{border-color:var(--border-md);transform:translateY(-2px)}
.card-section{margin-bottom:20px}
.card-section:last-child{margin-bottom:0}

/* Inputs */
.input{width:100%;background:var(--bg-surf);border:1px solid var(--border-md);border-radius:var(--radius);padding:10px 14px;font-family:var(--font-body);font-size:14px;color:var(--txt);outline:none;transition:border-color .15s}
.input:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-dim)}
.input::placeholder{color:var(--txt-sub)}
.label{font-size:13px;font-weight:500;color:var(--txt-muted);margin-bottom:6px;display:block}
.form-group{margin-bottom:16px}
textarea.input{resize:vertical;min-height:80px;line-height:1.6}

/* Badge / Pill */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:12px;font-weight:500}
.badge-primary{background:var(--primary-dim);color:var(--primary)}
.badge-success{background:var(--success-dim);color:var(--success)}
.badge-warning{background:rgba(245,166,35,0.12);color:var(--accent)}
.badge-danger{background:var(--danger-dim);color:var(--danger)}
.badge-neutral{background:var(--bg-raise);color:var(--txt-muted)}

/* Progress bar */
.progress-bar{height:6px;background:var(--bg-raise);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:var(--primary);border-radius:99px;transition:width .5s ease}
.progress-fill.success{background:var(--success)}
.progress-fill.accent{background:var(--accent)}

/* Divider */
.divider{border:none;border-top:1px solid var(--border);margin:20px 0}

/* Chapter/Exercise status */
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.status-dot.complete{background:var(--success)}
.status-dot.active{background:var(--primary);box-shadow:0 0 0 3px var(--primary-dim)}
.status-dot.locked{background:var(--txt-sub)}

/* Chat */
.chat-wrap{display:flex;flex-direction:column;gap:16px;padding-bottom:12px}
.chat-bubble{max-width:85%;padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.65;animation:fadeUp .3s ease}
.chat-user{align-self:flex-end;background:var(--primary);color:#fff;border-bottom-right-radius:4px}
.chat-ai{align-self:flex-start;background:var(--bg-raise);color:var(--txt);border-bottom-left-radius:4px;border:1px solid var(--border)}
.chat-typing span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--txt-muted);margin:0 2px;animation:pulse 1.2s ease-in-out infinite}
.chat-typing span:nth-child(2){animation-delay:.2s}
.chat-typing span:nth-child(3){animation-delay:.4s}
.chat-input-row{display:flex;gap:10px;padding-top:12px;border-top:1px solid var(--border)}
.source-cite{font-size:11px;color:var(--primary);background:var(--primary-dim);padding:2px 8px;border-radius:4px;margin-top:6px;display:inline-block;cursor:pointer}

/* MCQ */
.choice{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:var(--radius);border:1px solid var(--border-md);cursor:pointer;transition:all .15s;margin-bottom:8px;font-size:14px}
.choice:hover{border-color:var(--border-act);background:var(--bg-raise)}
.choice.selected{border-color:var(--primary);background:var(--primary-dim);color:var(--primary)}
.choice.correct{border-color:var(--success);background:var(--success-dim);color:var(--success)}
.choice.wrong{border-color:var(--danger);background:var(--danger-dim);color:var(--danger)}
.choice-label{width:26px;height:26px;border-radius:50%;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}

/* Exam timer */
.timer{font-family:var(--font-mono);font-size:20px;font-weight:500;color:var(--accent);letter-spacing:.05em}
.timer.warning{color:var(--danger);animation:pulse 1s ease-in-out infinite}

/* Stats/Score */
.score-ring{position:relative;display:inline-flex;align-items:center;justify-content:center}
.score-ring svg{transform:rotate(-90deg)}
.score-ring .score-label{position:absolute;text-align:center}
.score-ring .score-num{font-family:var(--font-display);font-size:36px;font-weight:700;color:var(--txt)}
.score-ring .score-pct{font-size:13px;color:var(--txt-muted)}
.stat-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}

/* Upload drop zone */
.dropzone{border:2px dashed var(--border-act);border-radius:var(--radius-lg);padding:48px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg-surf)}
.dropzone:hover,.dropzone.drag{border-color:var(--primary);background:var(--primary-dim)}
.dropzone-icon{font-size:40px;margin-bottom:12px;display:block}
.dropzone h3{font-family:var(--font-display);font-size:20px;margin-bottom:6px;color:var(--txt)}
.dropzone p{font-size:13px;color:var(--txt-muted)}

/* Roadmap */
.roadmap-item{display:flex;align-items:flex-start;gap:16px;padding:16px 0}
.roadmap-connector{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.roadmap-node{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;border:2px solid;transition:all .2s}
.roadmap-node.done{background:var(--success);border-color:var(--success);color:#fff}
.roadmap-node.current{background:var(--primary-dim);border-color:var(--primary);color:var(--primary)}
.roadmap-node.locked{background:var(--bg-raise);border-color:var(--border-md);color:var(--txt-sub)}
.roadmap-line{width:2px;flex:1;background:var(--border);min-height:24px}
.roadmap-body{flex:1;padding-bottom:24px}
.importance-bar{height:4px;border-radius:99px;background:var(--bg-raise);width:80px;overflow:hidden;margin-top:4px;display:inline-block}
.importance-fill{height:100%;border-radius:99px;background:var(--accent)}

/* Responsive */
.mobile-menu-btn{display:none;align-items:center;justify-content:center;width:36px;height:36px;border-radius:var(--radius);border:1px solid var(--border-md);background:transparent;cursor:pointer;color:var(--txt-muted)}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main-content{margin-left:0}
  .mobile-menu-btn{display:flex}
  .page{padding:16px}
  .top-bar{padding:0 16px}
  .grid-3{grid-template-columns:1fr!important}
  .grid-2{grid-template-columns:1fr!important}
  .study-layout{flex-direction:column!important}
  .chapter-tutor{max-width:100%!important;width:100%!important}
}
@media(max-width:1100px){
  .grid-3{grid-template-columns:repeat(2,1fr)!important}
}

/* Grid helpers */
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
@media(max-width:900px){.grid-4{grid-template-columns:repeat(2,1fr)}}

/* Landing specific */
.landing-hero{display:flex;flex-direction:column;align-items:center;text-align:center;padding:80px 24px;max-width:760px;margin:0 auto}
.hero-eyebrow{font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--primary);margin-bottom:16px;background:var(--primary-dim);padding:4px 14px;border-radius:99px;display:inline-block}
.hero-title{font-family:var(--font-display);font-size:clamp(40px,6vw,68px);font-weight:700;line-height:1.1;color:var(--txt);margin-bottom:20px;letter-spacing:-.5px}
.hero-title span{color:var(--primary)}
.hero-sub{font-size:17px;color:var(--txt-muted);line-height:1.7;margin-bottom:36px;max-width:540px}
.feature-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;padding:0 24px;max-width:900px;margin:0 auto 60px}
.feature-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;text-align:left}
.feature-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;font-size:18px}
.feature-card h3{font-family:var(--font-display);font-size:17px;font-weight:600;margin-bottom:6px;color:var(--txt)}
.feature-card p{font-size:13px;color:var(--txt-muted);line-height:1.6}
.flow-steps{display:flex;align-items:center;justify-content:center;gap:0;margin:40px 24px;flex-wrap:wrap}
.flow-step{display:flex;flex-direction:column;align-items:center;gap:6px;padding:0 20px}
.flow-step-num{width:32px;height:32px;border-radius:50%;background:var(--primary);color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center}
.flow-step-label{font-size:12px;color:var(--txt-muted);white-space:nowrap}
.flow-arrow{color:var(--txt-sub);font-size:18px;margin:0 -8px}
.auth-card{max-width:420px;width:100%;margin:0 auto}
.auth-tab{flex:1;padding:10px;text-align:center;font-size:14px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:var(--txt-muted);transition:all .15s}
.auth-tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.auth-divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--txt-sub);font-size:13px}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.skeleton{background:linear-gradient(90deg,var(--bg-card) 25%,var(--bg-raise) 50%,var(--bg-card) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--radius)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(4px)}
.modal{background:var(--bg-card);border:1px solid var(--border-md);border-radius:var(--radius-xl);padding:28px;width:100%;max-width:480px;animation:fadeUp .3s ease}
.progress-chapter-bar{width:100%;height:8px;background:var(--bg-raise);border-radius:99px;overflow:hidden;margin:6px 0}
.chapter-progress-fill{height:100%;border-radius:99px;transition:width .6s ease}
.topic-chip{display:inline-flex;padding:4px 10px;background:var(--bg-raise);border-radius:99px;font-size:12px;color:var(--txt-muted);margin:3px}
.source-box{background:var(--bg-surf);border:1px solid var(--border);border-left:3px solid var(--primary);border-radius:var(--radius);padding:12px 14px;font-size:13px;color:var(--txt-muted);line-height:1.6;margin-top:10px}
.source-box strong{color:var(--txt);display:block;margin-bottom:4px;font-size:12px}
.answer-feedback{border-radius:var(--radius);padding:16px;margin-top:12px;font-size:14px;line-height:1.6}
.answer-feedback.correct{background:var(--success-dim);border:1px solid rgba(34,197,94,0.2);color:#4ade80}
.answer-feedback.wrong{background:var(--danger-dim);border:1px solid rgba(239,68,68,0.2);color:#f87171}
.exam-q{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px}
.exam-q-num{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--txt-muted);margin-bottom:8px}
.exam-q-text{font-size:15px;color:var(--txt);margin-bottom:14px;line-height:1.6}
.pill-row{display:flex;flex-wrap:wrap;gap:6px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:64px 24px;text-align:center;color:var(--txt-muted)}
.empty-state-icon{font-size:48px;margin-bottom:16px;opacity:.5}
.empty-state h3{font-family:var(--font-display);font-size:22px;color:var(--txt);margin-bottom:8px}
.empty-state p{font-size:14px;max-width:320px;line-height:1.6}
</style>
</head>

<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const lessonContent = `Process Management is at the heart of every modern operating system. A **process** is an instance of a program in execution — distinct from the program itself, which is merely a static set of instructions.

Each process maintains its own **Process Control Block (PCB)**, which stores essential information: the process ID, program counter, CPU registers, memory limits, open files, and scheduling information.

**Process States:**
A process transitions through several states during its lifetime:
1. **New** — The process is being created
2. **Ready** — Waiting to be assigned to a CPU
3. **Running** — Instructions are being executed
4. **Waiting** — Waiting for some event (I/O, signal)
5. **Terminated** — The process has finished execution

**CPU Scheduling:**
The scheduler decides which ready process gets CPU time. Common algorithms include:
• **FCFS** (First Come, First Served) — simple but can cause the convoy effect
• **SJF** (Shortest Job First) — optimal for average wait time, but requires knowing burst times
• **Round Robin** — each process gets a fixed time quantum, good for interactive systems
• **Priority Scheduling** — processes run in order of priority; can suffer from starvation`;

/* ─── Vercel AI SDK–style useChat hook (calls Anthropic API) ─ */
function useChat({ systemPrompt = '' } = {}) {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [isLoading, setIsLoading] = useState(false);

  const append = useCallback(async (userMsg) => {
    const newMessages = [...messages, { role:'user', content: userMsg }];
    setMessages(newMessages);
    setIsLoading(true);

    try {
      // Vercel AI SDK pattern: POST to /api/chat with messages array
      // Here we call Anthropic directly as the prototype backend substitute
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'anthropic-version': '2023-06-01', 'x-api-key': window.__ANTHROPIC_KEY__ || '' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 600,
          system: systemPrompt || `You are an AI exam tutor for PassExamAI. Help students understand concepts clearly and concisely. Always reference the chapter context. Keep answers focused and academic. End with a source note like: [Source: Chapter notes – OS Fundamentals]`,
          messages: newMessages.map(m => ({ role: m.role, content: m.content }))
        })
      });

      if (!res.ok) throw new Error('API error');
      const data = await res.json();
      const assistantText = data.content?.[0]?.text || "I'm here to help! Ask me anything about this chapter.";
      setMessages(prev => [...prev, { role:'assistant', content: assistantText }]);
    } catch {
      // Graceful fallback with canned responses for demo
      const demos = [
        "Great question! In the context of CPU scheduling, the **Shortest Job First (SJF)** algorithm minimises average waiting time by always running the shortest available process next. However, the key practical challenge is predicting burst times — we often use exponential averaging of past CPU bursts to estimate future ones.\n\n[Source: Chapter 2 – Process Scheduling, OS Fundamentals Notes]",
        "The **Process Control Block (PCB)** is a data structure maintained by the OS for every process. It contains: the process state, program counter, CPU registers, memory management info, I/O status, and accounting information. Think of it as the process's identity card.\n\n[Source: Chapter 2 – Process Management, Lecture Slides]",
        "Context switching occurs when the CPU switches from one process to another. The OS saves the current process state into its PCB, then loads the new process's PCB. This is pure overhead — no useful work is done during the switch, which is why minimising context switch time is important.\n\n[Source: Chapter 2 – Process Management, University Notes]",
      ];
      const reply = demos[messages.length % demos.length];
      setMessages(prev => [...prev, { role:'assistant', content: reply }]);
    }
    setIsLoading(false);
  }, [messages, systemPrompt]);

  const handleSubmit = useCallback((e) => {
    e?.preventDefault();
    if (!input.trim() || isLoading) return;
    const msg = input.trim();
    setInput('');
    append(msg);
  }, [input, isLoading, append]);

  return { messages, input, setInput, isLoading, handleSubmit, append };
}

function ScoreRing({ score, size = 120 }) {

  const color = score >= 70 ? '#22C55E' : score >= 50 ? '#F5A623' : '#EF4444';
  return (
    <div className="score-ring" style={{ width:size, height:size }}>
      <svg width={size} height={size} viewBox="0 0 100 100">
        <circle cx="50" cy="50" r={r} fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth="8"/>
        <circle cx="50" cy="50" r={r} fill="none" stroke={color} strokeWidth="8"
          strokeDasharray={`${circ * pct} ${circ * (1-pct)}`}
          strokeLinecap="round" style={{ transition:'stroke-dasharray 1s ease' }}/>

function UploadPage({ onNav }) {
  const [drag, setDrag] = useState(false);

    setTimeout(() => setFiles(prev => prev.map(f => f.status === 'processing' ? {...f, status:'done'} : f)), 2000);

function ExerciseQuick({ onNav }) {
  const [selected, setSelected] = useState(null);
  const [revealed, setRevealed] = useState(false);
  const q = mockExamQuestions[0];

  return (
    <div className="card">
      <div style={{ marginBottom:12 }}>
        <span className="badge badge-primary" style={{ marginBottom:10, display:'inline-block' }}>Multiple choice · Q1 of 5</span>

      </div>
      {q.choices.map((c, i) => (
        <div key={i} className={`choice ${selected === i ? (revealed ? (i === q.correct ? 'correct' : 'wrong') : 'selected') : (revealed && i === q.correct ? 'correct' : '')}`}
          onClick={() => !revealed && setSelected(i)}>
          <div className="choice-label">{String.fromCharCode(65+i)}</div>
          <span>{c}</span>
          {revealed && i === q.correct && <Icon name="check" size={14} style={{ marginLeft:'auto' }}/>}
        </div>
      ))}
      <div style={{ display:'flex', gap:10, marginTop:14 }}>
        <button className="btn btn-primary" disabled={selected === null || revealed} onClick={() => setRevealed(true)}>
          Check answer
        </button>
        {revealed && <button className="btn btn-outline" onClick={() => { setSelected(null); setRevealed(false); }}>
          <Icon name="refresh" size={13}/> Try next
        </button>}
      </div>
      {revealed && (
        <div className={`answer-feedback ${selected === q.correct ? 'correct' : 'wrong'}`}>
          {selected === q.correct
            ? '✓ Correct! SJF minimises average waiting time by always running the shortest available process. However, it requires knowing or estimating burst times in advance.'
            : `✗ The correct answer is B (${q.choices[q.correct]}). SJF minimises average waiting time — FCFS can cause the convoy effect, and Round Robin introduces overhead from frequent context switches.`}
        </div>
      )}
    </div>
  );
}

function ExamPage({ onNav }) {

              onClick={() => { onNav(n.id); setSidebarOpen(false); }}>
              <span className="nav-icon"><Icon name={n.icon} size={16}/></span>
              {n.label}
            </button>
          ))}
          <div className="nav-section-label" style={{ marginTop:4 }}>Study flow</div>
          {navItems.filter(n => n.group === 'study').map(n => (
            <button key={n.id} className={`nav-item ${screen === n.id ? 'active' : ''}`}
              onClick={() => { onNav(n.id); setSidebarOpen(false); }}>
              <span className="nav-icon"><Icon name={n.icon} size={16}/></span>
              {n.label}
              {n.id === 'exercises' && <span className="nav-badge">5</span>}
            </button>
          ))}
        </div>
        <div className="sidebar-footer">
          <div className="sidebar-user">
            <div className="user-avatar">AJ</div>
            <div className="user-info">
              <div className="user-name">Alex Johnson</div>
              <div className="user-role">Student · Free plan</div>
            </div>
          </div>
        </div>
      </div>
      <div className="main-content">
        <div className="top-bar">
          <button className="mobile-menu-btn" onClick={() => setSidebarOpen(o => !o)}>
            <Icon name="menu" size={18}/>
          </button>
          <span className="top-bar-title">{titles[screen] || ''}</span>
          <div className="top-bar-actions">
            <button className="btn btn-icon btn-ghost"><Icon name="info" size={16}/></button>
            <button className="btn btn-icon btn-ghost"><Icon name="settings" size={16}/></button>
          </div>
        </div>
        {children}
      </div>
      {sidebarOpen && (
        <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,.5)', zIndex:99 }} onClick={() => setSidebarOpen(false)}/>
      )}
    </div>
  );
}

/* ─── App root ───────────────────────────────────────── */
function App() {
  const [screen, setScreen] = useState('landing');

  const authScreens = ['landing', 'login', 'signup'];
  const isAuth = authScreens.includes(screen);

  if (screen === 'landing') return <Landing onNav={setScreen}/>;
  if (screen === 'login') return <Auth mode="login" onNav={setScreen}/>;
  if (screen === 'signup') return <Auth mode="signup" onNav={setScreen}/>;

  return (
    <AppShell screen={screen} onNav={setScreen}>
      {screen === 'dashboard' && <Dashboard onNav={setScreen}/>}
      {screen === 'upload' && <UploadPage onNav={setScreen}/>}
      {screen === 'roadmap' && <RoadmapPage onNav={setScreen}/>}
      {screen === 'chapter' && <ChapterPage onNav={setScreen}/>}
      {screen === 'exercises' && <ExercisePage onNav={setScreen}/>}
      {screen === 'exam' && <ExamPage onNav={setScreen}/>}
      {screen === 'results' && <ResultsPage onNav={setScreen}/>}
      {screen === 'progress' && <ProgressPage onNav={setScreen}/>}
    </AppShell>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
